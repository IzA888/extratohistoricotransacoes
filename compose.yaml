services:
  # 🍃 Serviço do Redis (Cache do Extrato)
  redis:
    image: redis:7-alpine
    container_name: fintech-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # 🌟 Evita que o Redis caia por falta de RAM ao processar payloads grandes
    deploy:
      resources:
        limits:
          memory: 512M 
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  redis_data: